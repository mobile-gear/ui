name: Deploy to Netlify

on:
  workflow_run:
    workflows: ["Coverage Check"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Netlify deploy
        run: curl -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK }}"
